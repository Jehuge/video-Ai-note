<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AInote Video Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>AInote</h1>
          <p id="status">正在检查 app...</p>
        </div>
        <div class="toolbar">
          <button id="pick" title="选择页面里的视频区域">选视频</button>
          <button id="refresh" title="重新扫描">刷新</button>
        </div>
      </header>

      <section class="section">
        <label for="candidate">视频</label>
        <select id="candidate"></select>
      </section>

      <section class="section">
        <label for="format">清晰度</label>
        <select id="format"></select>
      </section>

      <section class="section">
        <label for="noteStyle">笔记模式</label>
        <select id="noteStyle">
          <option value="simple">简洁模式 (默认)</option>
          <option value="detailed">详细模式</option>
          <option value="academic">学术模式</option>
          <option value="creative">创意模式</option>
        </select>
      </section>

      <section class="options">
        <label><input id="screenshot" type="checkbox" /> 截图</label>
        <label><input id="cookies" type="checkbox" checked /> 站点 Cookie</label>
        <label><input id="autoRun" type="checkbox" checked /> 生成笔记</label>
      </section>
      <p id="cookieInfo" class="cookie-info">站点 Cookie 默认用于解析登录清晰度。</p>

      <button id="send" class="primary" disabled>生成视频笔记</button>

      <section id="progress" class="progress hidden">
        <div class="bar"><span id="bar"></span></div>
        <p id="progressText">排队中</p>
      </section>

      <p id="empty" class="empty hidden">当前页面没有检测到可解析视频。</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
